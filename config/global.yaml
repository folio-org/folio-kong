_format_version: "3.0"
plugins:
  - name: response-transformer
    enabled: true
    config:
      remove:
        headers:
          - Cache-Control
          - Pragma
          - Expires
      add:
        headers:
          - "Cache-Control:private, no-cache, no-store, max-age=0"
          - "Pragma:no-cache"
          - "Expires:0"
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains; preload"
