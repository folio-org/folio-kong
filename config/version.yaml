_format_version: "3.0"
services:
  - connect_timeout: 60000
    enabled: true
    host: 127.0.0.1
    name: version
    tags: [ "automation" ]
    path: /version
    plugins:
      - config:
          add:
            headers:
              - "Cache-Control:private, no-cache, no-store, max-age=0"
              - "Pragma:no-cache"
              - "Expires:0"
              - "Strict-Transport-Security:max-age=31536000; includeSubDomains; preload"
          remove:
            headers: []
          replace:
            headers:
              - "Cache-Control:private, no-cache, no-store, max-age=0"
              - "Pragma:no-cache"
              - "Expires:0"
        enabled: true
        name: response-transformer
        protocols:
          - http
          - https
    port: 8001
    protocol: ${{ env "DECK_SERVICE_PROTOCOL" }}
    read_timeout: 60000
    retries: 5
    routes:
      - https_redirect_status_code: 426
        name: version
        expression: http.method == "GET" && http.path == "/version"
